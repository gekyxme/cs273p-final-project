# Ablation 1b: Tabular-only baseline
# No image — MLP alone predicts Pawpularity from 12 binary metadata features.
# Compare val RMSE against fusion_concat to show image adds value.

data_dir:         "data"
checkpoint_dir:   "checkpoints"
log_dir:          "runs/tabular_only"
debug_mode:       false
val_split:        0.2
image_size:       224
tabular_input_dim: 12

backbone:          "efficientnet_b0"
fusion_mode:       "tabular_only"
freeze_backbone:   false
tabular_hidden_dim: 64
tabular_output_dim: 32
fusion_hidden_dim:  256
dropout:           0.3

seed:             42
epochs:           25
batch_size:       32
lr:               1.0e-3
weight_decay:     1.0e-4
scheduler:        "cosine"
num_workers:      0
log_interval:     10
